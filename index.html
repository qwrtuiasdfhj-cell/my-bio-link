<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link in Bio - My Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Prompt', sans-serif;
        }

        body {
            background-color: #2a4235; 
            display: flex;
            justify-content: center;
            min-height: 100vh;
            color: #ffffff;
        }

        .mobile-container {
            width: 100%;
            max-width: 400px;
            padding: 60px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        
        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #ffffff;
            box-shadow: 0 10px 25px rgba(144, 202, 161, 0.3);
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }

        .profile-img:hover {
            transform: scale(1.05);
        }

        
        .shop-name {
            font-size: 1.4rem;
            font-weight: 600;
            color: #1e4529;
            margin-bottom: 35px; 
            letter-spacing: 0.5px;
        }

        /* กล่องรวมปุ่มกด */
        .links-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 40px; 
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 16px 20px;
            background-color: #ffffff;
            color: #2c5e3b;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 500;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(144, 202, 161, 0.15);
            border: 2px solid transparent;
        }

        .link-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(144, 202, 161, 0.3);
            border-color: #bbf7d0;
            background-color: #fafdfb;
        }

        .icon {
            margin-right: 10px;
            font-size: 1.2rem;
        }

       
        .thank-you-text {
            font-size: 0.85rem;
            color: #88af94; 
            font-weight: 400;
            letter-spacing: 1px;
            text-transform: uppercase; 
        }
    </style>
</head>
<body>

    <div class="mobile-container">
        
        <img src="LM1.jpg" 
             alt="Shop Logo" class="profile-img">
        
        <h1 class="shop-name">ชิกกี้</h1>

        <div class="links-container">
            
            <a href="https://line.me/ti/p/KKiaIpvKdT" target="_blank" class="link-btn">
                <span class="icon">💌</span> DM for order
            </a>

            <a href="https://line.me/ti/g2/7dsYsLD2nMETNILNCLB9vkkMy0LCW50-4W0pKQ?utm_source=invitation&utm_medium=link_copy&utm_campaign=default" target="_blank" class="link-btn">
                <span class="icon">💬</span> Join OpenChat
            </a>

        </div>

        <div class="thank-you-text">
            — Thank you for your support —
        </div>
    </div>

</body>
</html>
